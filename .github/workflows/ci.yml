name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: pnpm install
      - name: Run tests (placeholder)
        run: echo "No tests defined yet"
